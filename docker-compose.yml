version: '3.9'

services:
  sqlserver-popa:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: sqlserver-popa
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./Backend/migrations:/migrations
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "sqlserver-popa", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT @@VERSION" ]
      interval: 10s
      retries: 10
      start_period: 10s

  migration-runner:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: migration-runner
    depends_on:
      sqlserver-popa:
        condition: service_healthy
    volumes:
      - ./Backend/migrations:/migrations
    entrypoint: >
      /bin/bash -c "
        echo 'Aguardando o banco de dados estar totalmente pronto...';
        /usr/local/bin/wait-for-it.sh sqlserver-popa:1433 --timeout=300 --strict -- echo 'Banco de dados pronto!';

        # Find migration files and store them in an array
        migration_files=(/migrations/*.sql)

        # Check if the array is empty (no files found)
        if [ \"$${migration_files[0]}\" = \"/migrations/*.sql\" ]; then
            echo '⚠️ Nenhum arquivo de migration encontrado.';
        else
            echo 'Iniciando a execução das migrations...';
            for file in \"$${migration_files[@]}\"; do
                echo 'Executando migration: '$$file'';
                /opt/mssql-tools/bin/sqlcmd -S sqlserver-popa -U sa -P '${SA_PASSWORD}' -i \"$$file\";
            done;
            echo '✅ Todas as migrations foram executadas';
        fi
        "

  mongodb-popa:
    image: mongo:7
    container_name: mongodb-popa
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      retries: 10
      start_period: 10s

  redis-popa:
    image: redis:7-alpine
    container_name: redis-popa
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 10
      start_period: 5s

  popadin-api:
    build:
      context: ./Backend
      dockerfile: src/PopaDin.Bkd.Api/Dockerfile
    depends_on:
      sqlserver-popa:
        condition: service_healthy
      mongodb-popa:
        condition: service_healthy
      redis-popa:
        condition: service_healthy
    ports:
      - "5285:5285"
    environment:
      - ASPNETCORE_URLS=http://+:5285/
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - ConnectionStrings__Database=Server=sqlserver-popa,1433;Database=master;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - MongoDbSettings__ConnectionString=mongodb://mongodb-popa:27017
      - MongoDbSettings__DatabaseName=popadin
      - RedisSettings__ConnectionString=redis-popa:6379
      - ServiceBusSettings__ConnectionString=${SERVICEBUS_CONNECTION_STRING}
      - ServiceBusSettings__QueueName=record-events
      - ServiceBusSettings__ExportQueueName=pdf-relatorios
      - ServiceBusSettings__NotificationsQueueName=notifications
      - BlobStorageSettings__ConnectionString=${BLOB_STORAGE_CONNECTION_STRING}
      - BlobStorageSettings__ContainerName=pdf-exports
      - BlobStorageSettings__ProfilePictureContainerName=profile-pictures
      - AppSettings__Secret=${JWT_SECRET}
    restart: unless-stopped

  popadin-alert-service:
    build:
      context: ./PopaDin.AlertService
      dockerfile: Dockerfile
    container_name: popadin-alert-service
    depends_on:
      mongodb-popa:
        condition: service_healthy
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - ServiceBusSettings__ConnectionString=${SERVICEBUS_CONNECTION_STRING}
      - ServiceBusSettings__QueueName=record-events
      - ServiceBusSettings__NotificationsQueueName=notifications
      - MongoDbSettings__ConnectionString=mongodb://mongodb-popa:27017
      - MongoDbSettings__DatabaseName=popadin
      - SmtpSettings__Host=${SMTP_HOST}
      - SmtpSettings__Port=${SMTP_PORT}
      - SmtpSettings__Username=${SMTP_USERNAME}
      - SmtpSettings__Password=${SMTP_PASSWORD}
      - SmtpSettings__SenderEmail=${SMTP_SENDER_EMAIL}
      - SmtpSettings__SenderName=PopaDin
    restart: unless-stopped

  popadin-export-service:
    build:
      context: ./PopaDin.ExportService
      dockerfile: Dockerfile
    container_name: popadin-export-service
    depends_on:
      mongodb-popa:
        condition: service_healthy
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - ServiceBusSettings__ConnectionString=${SERVICEBUS_CONNECTION_STRING}
      - ServiceBusSettings__QueueName=pdf-relatorios
      - ServiceBusSettings__NotificationsQueueName=notifications
      - MongoDbSettings__ConnectionString=mongodb://mongodb-popa:27017
      - MongoDbSettings__DatabaseName=popadin
      - BlobStorageSettings__ConnectionString=${BLOB_STORAGE_CONNECTION_STRING}
      - BlobStorageSettings__ContainerName=pdf-exports
    restart: unless-stopped

  popadin-notification-hub:
    build:
      context: ./PopaDin.NotificationHub
      dockerfile: Dockerfile
    container_name: popadin-notification-hub
    depends_on:
      mongodb-popa:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb-popa:27017/popadin
      - SERVICEBUS_CONNECTION_STRING=${SERVICEBUS_CONNECTION_STRING}
      - SERVICEBUS_QUEUE_NAME=notifications
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  popadin-analytics-service:
    build:
      context: ./PopaDin.AnalyticsService
      dockerfile: Dockerfile
    container_name: popadin-analytics-service
    depends_on:
      mongodb-popa:
        condition: service_healthy
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb-popa:27017/popadin
      - JWT_SECRET=${JWT_SECRET}
      - CRON_SCHEDULE=0 */6 * * *
    restart: unless-stopped

  popadin-frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: popadin-frontend
    ports:
      - "3000:80"
    depends_on:
      - popadin-api
    restart: unless-stopped

volumes:
  sqlserver_data:
  mongodb_data:
  redis_data:
